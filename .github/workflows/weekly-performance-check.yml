name: Weekly Performance Check

# Runs every Sunday at 9 AM UTC (4 AM EST / 1 AM PST)
on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:  # Allows manual triggering from Actions tab

jobs:
  performance-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # write permission required for committing results
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run PageSpeed check (all pages, with retry)
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: node astro-site/scripts/pagespeed-check.mjs

      - name: Extract scores from JSON
        id: scores
        run: |
          RESULTS=astro-site/src/data/seo-results.json

          # Mobile scores
          echo "home_perf=$(jq -r '.results.mobile.home.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_a11y=$(jq -r '.results.mobile.home.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_bp=$(jq -r '.results.mobile.home.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_seo=$(jq -r '.results.mobile.home.seo' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_lcp=$(jq -r '.results.mobile.home.lcp' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_cls=$(jq -r '.results.mobile.home.cls' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_tbt=$(jq -r '.results.mobile.home.tbt' $RESULTS)" >> $GITHUB_OUTPUT

          echo "about_perf=$(jq -r '.results.mobile.about.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_a11y=$(jq -r '.results.mobile.about.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_bp=$(jq -r '.results.mobile.about.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_seo=$(jq -r '.results.mobile.about.seo' $RESULTS)" >> $GITHUB_OUTPUT

          echo "blog_perf=$(jq -r '.results.mobile.blog.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_a11y=$(jq -r '.results.mobile.blog.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_bp=$(jq -r '.results.mobile.blog.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_seo=$(jq -r '.results.mobile.blog.seo' $RESULTS)" >> $GITHUB_OUTPUT

          echo "builds_perf=$(jq -r '.results.mobile.builds.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_a11y=$(jq -r '.results.mobile.builds.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_bp=$(jq -r '.results.mobile.builds.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_seo=$(jq -r '.results.mobile.builds.seo' $RESULTS)" >> $GITHUB_OUTPUT

          echo "gems_perf=$(jq -r '.results.mobile.gems.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_a11y=$(jq -r '.results.mobile.gems.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_bp=$(jq -r '.results.mobile.gems.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_seo=$(jq -r '.results.mobile.gems.seo' $RESULTS)" >> $GITHUB_OUTPUT

          # Desktop scores
          echo "home_d_perf=$(jq -r '.results.desktop.home.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_d_a11y=$(jq -r '.results.desktop.home.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_d_bp=$(jq -r '.results.desktop.home.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_d_seo=$(jq -r '.results.desktop.home.seo' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_d_lcp=$(jq -r '.results.desktop.home.lcp' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_d_cls=$(jq -r '.results.desktop.home.cls' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_d_tbt=$(jq -r '.results.desktop.home.tbt' $RESULTS)" >> $GITHUB_OUTPUT

          echo "about_d_perf=$(jq -r '.results.desktop.about.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_d_a11y=$(jq -r '.results.desktop.about.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_d_bp=$(jq -r '.results.desktop.about.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_d_seo=$(jq -r '.results.desktop.about.seo' $RESULTS)" >> $GITHUB_OUTPUT

          echo "blog_d_perf=$(jq -r '.results.desktop.blog.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_d_a11y=$(jq -r '.results.desktop.blog.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_d_bp=$(jq -r '.results.desktop.blog.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_d_seo=$(jq -r '.results.desktop.blog.seo' $RESULTS)" >> $GITHUB_OUTPUT

          echo "builds_d_perf=$(jq -r '.results.desktop.builds.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_d_a11y=$(jq -r '.results.desktop.builds.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_d_bp=$(jq -r '.results.desktop.builds.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_d_seo=$(jq -r '.results.desktop.builds.seo' $RESULTS)" >> $GITHUB_OUTPUT

          echo "gems_d_perf=$(jq -r '.results.desktop.gems.performance' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_d_a11y=$(jq -r '.results.desktop.gems.accessibility' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_d_bp=$(jq -r '.results.desktop.gems.bestPractices' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_d_seo=$(jq -r '.results.desktop.gems.seo' $RESULTS)" >> $GITHUB_OUTPUT

          # Agentic Browsing scores (mobile)
          echo "home_ab_passed=$(jq -r '.results.mobile.home.agenticBrowsingPassed // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "home_ab_total=$(jq -r '.results.mobile.home.agenticBrowsingTotal // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_ab_passed=$(jq -r '.results.mobile.about.agenticBrowsingPassed // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "about_ab_total=$(jq -r '.results.mobile.about.agenticBrowsingTotal // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_ab_passed=$(jq -r '.results.mobile.blog.agenticBrowsingPassed // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "blog_ab_total=$(jq -r '.results.mobile.blog.agenticBrowsingTotal // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_ab_passed=$(jq -r '.results.mobile.builds.agenticBrowsingPassed // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "builds_ab_total=$(jq -r '.results.mobile.builds.agenticBrowsingTotal // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_ab_passed=$(jq -r '.results.mobile.gems.agenticBrowsingPassed // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT
          echo "gems_ab_total=$(jq -r '.results.mobile.gems.agenticBrowsingTotal // "N/A"' $RESULTS)" >> $GITHUB_OUTPUT

      - name: Generate Summary
        run: |
          S=${{ steps.scores.outputs.home_perf }}
          echo "# 📊 Weekly Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Core Web Vitals" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Mobile (Homepage)" >> $GITHUB_STEP_SUMMARY
          echo "- **LCP**: ${{ steps.scores.outputs.home_lcp }}ms (threshold: <8000ms)" >> $GITHUB_STEP_SUMMARY
          echo "- **CLS**: ${{ steps.scores.outputs.home_cls }} (threshold: <0.1)" >> $GITHUB_STEP_SUMMARY
          echo "- **TBT**: ${{ steps.scores.outputs.home_tbt }}ms (target: <300ms)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🖥️ Desktop (Homepage)" >> $GITHUB_STEP_SUMMARY
          echo "- **LCP**: ${{ steps.scores.outputs.home_d_lcp }}ms (threshold: <2500ms)" >> $GITHUB_STEP_SUMMARY
          echo "- **CLS**: ${{ steps.scores.outputs.home_d_cls }} (threshold: <0.1)" >> $GITHUB_STEP_SUMMARY
          echo "- **TBT**: ${{ steps.scores.outputs.home_d_tbt }}ms (target: <300ms)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📱 Mobile Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Performance | Accessibility | Best Practices | SEO | Agentic Browsing |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|---------------|----------------|-----|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Home | ${{ steps.scores.outputs.home_perf }} | ${{ steps.scores.outputs.home_a11y }} | ${{ steps.scores.outputs.home_bp }} | ${{ steps.scores.outputs.home_seo }} | ${{ steps.scores.outputs.home_ab_passed }}/${{ steps.scores.outputs.home_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| About | ${{ steps.scores.outputs.about_perf }} | ${{ steps.scores.outputs.about_a11y }} | ${{ steps.scores.outputs.about_bp }} | ${{ steps.scores.outputs.about_seo }} | ${{ steps.scores.outputs.about_ab_passed }}/${{ steps.scores.outputs.about_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Blog | ${{ steps.scores.outputs.blog_perf }} | ${{ steps.scores.outputs.blog_a11y }} | ${{ steps.scores.outputs.blog_bp }} | ${{ steps.scores.outputs.blog_seo }} | ${{ steps.scores.outputs.blog_ab_passed }}/${{ steps.scores.outputs.blog_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Builds | ${{ steps.scores.outputs.builds_perf }} | ${{ steps.scores.outputs.builds_a11y }} | ${{ steps.scores.outputs.builds_bp }} | ${{ steps.scores.outputs.builds_seo }} | ${{ steps.scores.outputs.builds_ab_passed }}/${{ steps.scores.outputs.builds_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gems | ${{ steps.scores.outputs.gems_perf }} | ${{ steps.scores.outputs.gems_a11y }} | ${{ steps.scores.outputs.gems_bp }} | ${{ steps.scores.outputs.gems_seo }} | ${{ steps.scores.outputs.gems_ab_passed }}/${{ steps.scores.outputs.gems_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🖥️ Desktop Lighthouse Scores" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Performance | Accessibility | Best Practices | SEO | Agentic Browsing |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------------|---------------|----------------|-----|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Home | ${{ steps.scores.outputs.home_d_perf }} | ${{ steps.scores.outputs.home_d_a11y }} | ${{ steps.scores.outputs.home_d_bp }} | ${{ steps.scores.outputs.home_d_seo }} | ${{ steps.scores.outputs.home_ab_passed }}/${{ steps.scores.outputs.home_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| About | ${{ steps.scores.outputs.about_d_perf }} | ${{ steps.scores.outputs.about_d_a11y }} | ${{ steps.scores.outputs.about_d_bp }} | ${{ steps.scores.outputs.about_d_seo }} | ${{ steps.scores.outputs.about_ab_passed }}/${{ steps.scores.outputs.about_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Blog | ${{ steps.scores.outputs.blog_d_perf }} | ${{ steps.scores.outputs.blog_d_a11y }} | ${{ steps.scores.outputs.blog_d_bp }} | ${{ steps.scores.outputs.blog_d_seo }} | ${{ steps.scores.outputs.blog_ab_passed }}/${{ steps.scores.outputs.blog_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Builds | ${{ steps.scores.outputs.builds_d_perf }} | ${{ steps.scores.outputs.builds_d_a11y }} | ${{ steps.scores.outputs.builds_d_bp }} | ${{ steps.scores.outputs.builds_d_seo }} | ${{ steps.scores.outputs.builds_ab_passed }}/${{ steps.scores.outputs.builds_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gems | ${{ steps.scores.outputs.gems_d_perf }} | ${{ steps.scores.outputs.gems_d_a11y }} | ${{ steps.scores.outputs.gems_d_bp }} | ${{ steps.scores.outputs.gems_d_seo }} | ${{ steps.scores.outputs.gems_ab_passed }}/${{ steps.scores.outputs.gems_ab_total }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View detailed reports on PageSpeed Insights](https://pagespeed.web.dev/?url=https://lukestahl.io/)" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add astro-site/src/data/seo-results.json
          git diff --staged --quiet || git commit -m "📊 Update SEO performance results - $(date -u +"%Y-%m-%d %H:%M UTC")"
          git push

      - name: Create Performance Report Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT=$(cat <<EOF
          ## 📊 Weekly Performance Report - $(date '+%B %d, %Y')

          ### 📱 Mobile Performance Scores
          | Page | Score |
          |------|-------|
          | Home | ${{ steps.scores.outputs.home_perf }} |
          | About | ${{ steps.scores.outputs.about_perf }} |
          | Blog | ${{ steps.scores.outputs.blog_perf }} |
          | Builds | ${{ steps.scores.outputs.builds_perf }} |
          | Gems | ${{ steps.scores.outputs.gems_perf }} |

          ### 🖥️ Desktop Performance Scores
          | Page | Score |
          |------|-------|
          | Home | ${{ steps.scores.outputs.home_d_perf }} |
          | About | ${{ steps.scores.outputs.about_d_perf }} |
          | Blog | ${{ steps.scores.outputs.blog_d_perf }} |
          | Builds | ${{ steps.scores.outputs.builds_d_perf }} |
          | Gems | ${{ steps.scores.outputs.gems_d_perf }} |

          ### 🎯 Core Web Vitals

          **📱 Mobile (Homepage)**
          - **LCP**: ${{ steps.scores.outputs.home_lcp }}ms (target: <2500ms)
          - **CLS**: ${{ steps.scores.outputs.home_cls }} (target: <0.1)
          - **TBT**: ${{ steps.scores.outputs.home_tbt }}ms (target: <300ms)

          **🖥️ Desktop (Homepage)**
          - **LCP**: ${{ steps.scores.outputs.home_d_lcp }}ms (target: <2500ms)
          - **CLS**: ${{ steps.scores.outputs.home_d_cls }} (target: <0.1)
          - **TBT**: ${{ steps.scores.outputs.home_d_tbt }}ms (target: <300ms)

          ---

          🔗 [View Full Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          🔗 [Test on PageSpeed Insights](https://pagespeed.web.dev/?url=https://lukestahl.io/)
          EOF
          )

          gh issue create \
            --title "📊 Weekly Performance Report - $(date '+%B %d, %Y')" \
            --body "$REPORT" \
            --label "performance" \
            --repo ${{ github.repository }}

      - name: Send Email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          SUBJECT="📊 Weekly Performance Report - $(date '+%B %d, %Y')"
          BODY="<h2>📊 Weekly Performance Report - $(date '+%B %d, %Y')</h2><h3>📱 Mobile Performance Scores</h3><table border=\"1\" cellpadding=\"8\" cellspacing=\"0\" style=\"border-collapse: collapse;\"><tr style=\"background: #f5f5f5;\"><th style=\"padding: 8px;\">Page</th><th style=\"padding: 8px;\">Score</th></tr><tr><td style=\"padding: 8px;\">Home</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.home_perf }}</td></tr><tr><td style=\"padding: 8px;\">About</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.about_perf }}</td></tr><tr><td style=\"padding: 8px;\">Blog</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.blog_perf }}</td></tr><tr><td style=\"padding: 8px;\">Builds</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.builds_perf }}</td></tr><tr><td style=\"padding: 8px;\">Gems</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.gems_perf }}</td></tr></table><h3>🖥️ Desktop Performance Scores</h3><table border=\"1\" cellpadding=\"8\" cellspacing=\"0\" style=\"border-collapse: collapse;\"><tr style=\"background: #f5f5f5;\"><th style=\"padding: 8px;\">Page</th><th style=\"padding: 8px;\">Score</th></tr><tr><td style=\"padding: 8px;\">Home</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.home_d_perf }}</td></tr><tr><td style=\"padding: 8px;\">About</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.about_d_perf }}</td></tr><tr><td style=\"padding: 8px;\">Blog</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.blog_d_perf }}</td></tr><tr><td style=\"padding: 8px;\">Builds</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.builds_d_perf }}</td></tr><tr><td style=\"padding: 8px;\">Gems</td><td style=\"padding: 8px;\">${{ steps.scores.outputs.gems_d_perf }}</td></tr></table><h3>🎯 Core Web Vitals</h3><h4>📱 Mobile (Homepage)</h4><ul><li><strong>LCP:</strong> ${{ steps.scores.outputs.home_lcp }}ms (target: &lt;2500ms)</li><li><strong>CLS:</strong> ${{ steps.scores.outputs.home_cls }} (target: &lt;0.1)</li><li><strong>TBT:</strong> ${{ steps.scores.outputs.home_tbt }}ms (target: &lt;300ms)</li></ul><h4>🖥️ Desktop (Homepage)</h4><ul><li><strong>LCP:</strong> ${{ steps.scores.outputs.home_d_lcp }}ms (target: &lt;2500ms)</li><li><strong>CLS:</strong> ${{ steps.scores.outputs.home_d_cls }} (target: &lt;0.1)</li><li><strong>TBT:</strong> ${{ steps.scores.outputs.home_d_tbt }}ms (target: &lt;300ms)</li></ul><hr><p><a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">View Full Workflow Run</a><br><a href=\"https://pagespeed.web.dev/?url=https://lukestahl.io/\">Test on PageSpeed Insights</a></p>"

          PAYLOAD=$(jq -n \
            --arg from "$FROM_EMAIL" \
            --arg to "$TO_EMAIL" \
            --arg subject "$SUBJECT" \
            --arg html "$BODY" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          echo "Sending email from: $FROM_EMAIL to: $TO_EMAIL"
          RESPONSE=$(curl -w "\nHTTP_STATUS:%{http_code}" -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "Resend API Response: $RESPONSE"

          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Error: Email sending failed with status $HTTP_STATUS"
          else
            echo "Email sent successfully!"
          fi
