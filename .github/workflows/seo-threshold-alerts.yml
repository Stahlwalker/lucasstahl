name: SEO threshold alerts

# Weekly check for week-over-week page movement that crosses thresholds.
# Silent when nothing crossed. Posts to Slack + email when something did.
on:
  schedule:
    - cron: '0 14 * * 1'  # Mondays at 14:00 UTC (10am ET / 7am PT)
  workflow_dispatch:

jobs:
  threshold-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'astro-site/package-lock.json'

      - name: Install dependencies
        run: cd astro-site && npm ci

      - name: Run threshold alerts
        working-directory: astro-site
        env:
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ANALYTICS_CHANNEL_ID: ${{ secrets.SLACK_ANALYTICS_CHANNEL_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
        run: node scripts/seo/threshold-alerts.mjs
