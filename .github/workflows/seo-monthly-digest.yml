name: SEO monthly digest

# 1st of each month: pull 30d performance, generate AI commentary, post to
# Slack + email, commit the report to seo/digests/YYYY-MM.md for the archive.
on:
  schedule:
    - cron: '0 14 1 * *'  # 1st of month, 14:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # to commit the digest archive

jobs:
  monthly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'astro-site/package-lock.json'

      - name: Install dependencies
        run: cd astro-site && npm ci

      - name: Install Anthropic SDK
        run: cd astro-site && npm install --no-save @anthropic-ai/sdk

      - name: Build site (needed so sitemap.xml exists for stuck-pages check)
        working-directory: astro-site
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PUBLIC_SENTRY_DSN: ${{ secrets.PUBLIC_SENTRY_DSN }}
        run: npm run build

      - name: Run monthly digest
        working-directory: astro-site
        env:
          GSC_OAUTH_CLIENT_ID: ${{ secrets.GSC_OAUTH_CLIENT_ID }}
          GSC_OAUTH_CLIENT_SECRET: ${{ secrets.GSC_OAUTH_CLIENT_SECRET }}
          GSC_OAUTH_REFRESH_TOKEN: ${{ secrets.GSC_OAUTH_REFRESH_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ANALYTICS_CHANNEL_ID: ${{ secrets.SLACK_ANALYTICS_CHANNEL_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          NOTIFICATION_EMAIL: ${{ secrets.NOTIFICATION_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/seo/monthly-digest.mjs

      - name: Commit digest to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain seo/digests/)" ]; then
            git add seo/digests/
            git commit -m "📊 SEO digest $(date -u +%Y-%m)"
            git push
          else
            echo "No digest changes to commit."
          fi
