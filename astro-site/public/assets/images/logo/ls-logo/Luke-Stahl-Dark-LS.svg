<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220" role="img" aria-label="LS keycap — command icon, backlit">
  <title>LS · Return keycap · Backlit</title>
  <defs>
    <linearGradient id="rbSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1128"></stop>
      <stop offset="1" stop-color="#020610"></stop>
    </linearGradient>
    <linearGradient id="rbTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1a35"></stop>
      <stop offset="1" stop-color="#070c1a"></stop>
    </linearGradient>
    <radialGradient id="rbBacklight" cx="50%" cy="120%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".35"></stop>
      <stop offset=".6" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="rbShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.55"></feDropShadow>
    </filter>
    <filter id="rbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>
  <g transform="translate(40 20)" filter="url(#rbShadow)">
    <rect x="0" y="0" width="240" height="170" rx="24" fill="url(#rbSide)"></rect>
    <rect x="0" y="0" width="240" height="4" rx="2" fill="#22d3ee" opacity=".18"></rect>
    <rect x="10" y="8" width="220" height="140" rx="18" fill="url(#rbTop)" stroke="#22d3ee" stroke-opacity=".18" stroke-width="1"></rect>
    <rect x="10" y="8" width="220" height="140" rx="18" fill="url(#rbBacklight)"></rect>
    <rect x="10" y="8" width="220" height="2" fill="#22d3ee" opacity=".22"></rect>
    <rect x="14" y="132" width="212" height="14" rx="6" fill="#000" opacity=".4"></rect>
    <g transform="translate(22 22)" stroke="#22d3ee" stroke-width="1.8" fill="none" filter="url(#rbGlow)">
      <rect x="11" y="11" width="10" height="10" rx="0.5"></rect>
      <circle cx="7" cy="7" r="4"></circle>
      <circle cx="25" cy="7" r="4"></circle>
      <circle cx="7" cy="25" r="4"></circle>
      <circle cx="25" cy="25" r="4"></circle>
      <line x1="11" y1="11" x2="9.83" y2="9.83" stroke-linecap="round"></line>
      <line x1="21" y1="11" x2="22.17" y2="9.83" stroke-linecap="round"></line>
      <line x1="11" y1="21" x2="9.83" y2="22.17" stroke-linecap="round"></line>
      <line x1="21" y1="21" x2="22.17" y2="22.17" stroke-linecap="round"></line>
    </g>
    <g filter="url(#rbGlow)">
      <text x="120" y="96" text-anchor="middle" font-family="&#39;Fira Code&#39;, ui-monospace, Menlo, monospace" font-weight="700" font-size="68" fill="#22d3ee" letter-spacing="-1">LS</text>
    </g>
  </g>
