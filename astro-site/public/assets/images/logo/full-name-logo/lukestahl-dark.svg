<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" role="img" aria-label="Luke Stahl — backlit nameplate keycap">
  <title>Luke Stahl · Backlit nameplate</title>
  <defs>
    <linearGradient id="npSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1128"></stop>
      <stop offset="1" stop-color="#020610"></stop>
    </linearGradient>
    <linearGradient id="npTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f1a35"></stop>
      <stop offset="1" stop-color="#070c1a"></stop>
    </linearGradient>
    <radialGradient id="npBacklight" cx="50%" cy="120%" r="70%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".35"></stop>
      <stop offset=".6" stop-color="#22d3ee" stop-opacity="0"></stop>
    </radialGradient>
    <filter id="npShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity="0.55"></feDropShadow>
    </filter>
    <filter id="npGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  <g transform="translate(40 30)" filter="url(#npShadow)">
    
    <rect x="0" y="0" width="640" height="180" rx="32" fill="url(#npSide)"></rect>
    
    <rect x="0" y="0" width="640" height="4" rx="2" fill="#22d3ee" opacity=".18"></rect>
    
    <rect x="12" y="8" width="616" height="148" rx="24" fill="url(#npTop)" stroke="#22d3ee" stroke-opacity=".18" stroke-width="1"></rect>
    
    <rect x="12" y="8" width="616" height="148" rx="24" fill="url(#npBacklight)"></rect>
    
    <rect x="12" y="8" width="616" height="2" fill="#22d3ee" opacity=".22"></rect>
    
    <rect x="16" y="140" width="608" height="14" rx="6" fill="#000" opacity=".4"></rect>

    
    <g transform="translate(34 34)" stroke="#22d3ee" stroke-width="1.8" fill="none" filter="url(#npGlow)">
      <rect x="11" y="11" width="10" height="10" rx="0.5"></rect>
      <circle cx="7" cy="7" r="4"></circle>
      <circle cx="25" cy="7" r="4"></circle>
      <circle cx="7" cy="25" r="4"></circle>
      <circle cx="25" cy="25" r="4"></circle>
      <line x1="11" y1="11" x2="9.83" y2="9.83" stroke-linecap="round"></line>
      <line x1="21" y1="11" x2="22.17" y2="9.83" stroke-linecap="round"></line>
      <line x1="11" y1="21" x2="9.83" y2="22.17" stroke-linecap="round"></line>
      <line x1="21" y1="21" x2="22.17" y2="22.17" stroke-linecap="round"></line>
    </g>

    
    <g filter="url(#npGlow)">
      <text x="320" y="100" text-anchor="middle" font-family="&#39;Fira Code&#39;, ui-monospace, Menlo, monospace" font-weight="700" font-size="54" fill="#22d3ee" letter-spacing="-.5">Luke Stahl</text>
    </g>
  </g>
</svg>