<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 240" width="720" height="240" role="img" aria-label="Luke Stahl — light nameplate keycap">
  <title>Luke Stahl · Light nameplate</title>
  <defs>
    <linearGradient id="npLSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"></stop>
      <stop offset="1" stop-color="#94a3b8"></stop>
    </linearGradient>
    <linearGradient id="npLTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"></stop>
      <stop offset="1" stop-color="#dfe4ec"></stop>
    </linearGradient>
    <filter id="npLShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.28"></feDropShadow>
    </filter>
  </defs>

  <g transform="translate(40 30)" filter="url(#npLShadow)">
    
    <rect x="0" y="0" width="640" height="180" rx="32" fill="url(#npLSide)"></rect>
    
    <rect x="0" y="0" width="640" height="4" rx="2" fill="#ffffff" opacity=".35"></rect>
    
    <rect x="12" y="8" width="616" height="148" rx="24" fill="url(#npLTop)" stroke="#b8c2cf" stroke-width="1"></rect>
    
    <rect x="16" y="140" width="608" height="14" rx="6" fill="#000" opacity=".06"></rect>

    
    <g transform="translate(34 34)" stroke="#0e7490" stroke-width="1.8" fill="none">
      <rect x="11" y="11" width="10" height="10" rx="0.5"></rect>
      <circle cx="7" cy="7" r="4"></circle>
      <circle cx="25" cy="7" r="4"></circle>
      <circle cx="7" cy="25" r="4"></circle>
      <circle cx="25" cy="25" r="4"></circle>
      <line x1="11" y1="11" x2="9.83" y2="9.83" stroke-linecap="round"></line>
      <line x1="21" y1="11" x2="22.17" y2="9.83" stroke-linecap="round"></line>
      <line x1="11" y1="21" x2="9.83" y2="22.17" stroke-linecap="round"></line>
      <line x1="21" y1="21" x2="22.17" y2="22.17" stroke-linecap="round"></line>
    </g>

    
    <text x="320" y="100" text-anchor="middle" font-family="&#39;Fira Code&#39;, ui-monospace, Menlo, monospace" font-weight="700" font-size="54" fill="#0e7490" letter-spacing="-.5">Luke Stahl</text>
  </g>
</svg>