<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260" role="img" aria-label="LS keyboard keys — light">
  <title>LS · Light keycaps</title>
  <defs>
    <linearGradient id="ltSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cbd5e1"></stop>
      <stop offset="1" stop-color="#94a3b8"></stop>
    </linearGradient>
    <linearGradient id="ltTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"></stop>
      <stop offset="1" stop-color="#dfe4ec"></stop>
    </linearGradient>
    <filter id="ltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.28"></feDropShadow>
    </filter>
  </defs>

  
  <g transform="translate(30 20)" filter="url(#ltShadow)">
    <rect x="0" y="0" width="200" height="210" rx="26" fill="url(#ltSide)"></rect>
    <rect x="0" y="0" width="200" height="4" rx="2" fill="#ffffff" opacity=".35"></rect>
    <rect x="14" y="10" width="172" height="170" rx="20" fill="url(#ltTop)" stroke="#b8c2cf" stroke-width="1"></rect>
    <rect x="18" y="165" width="164" height="14" rx="6" fill="#000" opacity=".05"></rect>
    <text x="100" y="126" text-anchor="middle" font-family="&#39;Fira Code&#39;, ui-monospace, Menlo, monospace" font-weight="700" font-size="112" fill="#0e7490" letter-spacing="-2">L</text>
  </g>

  
  <g transform="translate(290 20)" filter="url(#ltShadow)">
    <rect x="0" y="0" width="200" height="210" rx="26" fill="url(#ltSide)"></rect>
    <rect x="0" y="0" width="200" height="4" rx="2" fill="#ffffff" opacity=".35"></rect>
    <rect x="14" y="10" width="172" height="170" rx="20" fill="url(#ltTop)" stroke="#b8c2cf" stroke-width="1"></rect>
    <rect x="18" y="165" width="164" height="14" rx="6" fill="#000" opacity=".05"></rect>
    <text x="100" y="126" text-anchor="middle" font-family="&#39;Fira Code&#39;, ui-monospace, Menlo, monospace" font-weight="700" font-size="112" fill="#0e7490" letter-spacing="-2">S</text>
  </g>
</svg>